# Blacklist the TAS2781 HDA I2C codec driver.
#
# snd_hda_scodec_tas2781_i2c binds to the TAS2781 amplifiers over I2C and
# calls power_up_sync() (via request_firmware_nowait) on every HDA codec
# resume, including the SOF DSP D0ix wake-up cycle. This overwrites the
# i2cset-programmed bypass register state set by 2pa-byps.sh and drops
# speaker volume. Blacklisting the driver eliminates this firmware-reload
# path; 2pa-byps.sh becomes the sole authority on amp programming.
#
# This approach was recommended by Maxim Raznatovski:
#   https://github.com/maximmaxim345/yoga_pro_9i_gen9_linux
# Use 'install /bin/false' rather than 'blacklist': blacklist only prevents
# automatic udev loading, but ACPI aliases can still trigger direct loading.
# install /bin/false blocks all loading paths including dependency loading.
install snd_hda_scodec_tas2781_i2c /bin/false
